<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BC | Admin Calendar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <style>
        :root { --green: #2D9546; --blue: #1E5B9A; --gold: #F9C21C; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 10px; }
        
        header { text-align: center; padding: 10px; background: white; border-radius: 15px; margin-bottom: 10px; border-bottom: 4px solid var(--gold); }
        .logo { font-weight: 900; font-size: 20px; }
        
        #calendar-card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        /* Calendar Styling */
        .fc-toolbar-title { font-size: 1.1em !important; color: var(--blue); }
        .fc-button-primary { background-color: var(--green) !important; border: none !important; }
        .fc-daygrid-event { background-color: var(--blue) !important; border: none !important; }

        /* Modal / Form Styling */
        #booking-modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 350px; background: white; padding: 20px; z-index: 100;
            border-radius: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 90; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .save-btn { background: var(--green); color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; }
        .close-btn { background: #eee; color: #666; margin-top: 5px; border: none; width: 100%; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <span style="color:var(--green)">BRAZILIAN</span> <span style="color:var(--blue)">CLEANING</span>
        </div>
        <small style="color:#999">Admin Schedule Manager</small>
    </header>

    <div id="calendar-card">
        <div id="calendar"></div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div id="booking-modal">
        <h3 id="selected-date-display" style="color:var(--blue); margin-top:0;">New Appointment</h3>
        <input type="text" id="client-name" placeholder="Client Name">
        <select id="appt-time">
            <script>
                for(let i=8; i<=18; i++) {
                    let h = i > 12 ? i-12 : i;
                    let ampm = i >= 12 ? 'PM' : 'AM';
                    document.write(`<option value="${h}:00 ${ampm}">${h}:00 ${ampm}</option>`);
                }
            </script>
        </select>
        <textarea id="notes" placeholder="Address & Specific Notes"></textarea>
        <button class="save-btn" onclick="saveAppointment()">SAVE TO CALENDAR</button>
        <button class="close-btn" onclick="closeModal()">CANCEL</button>
    </div>

    <script>
        let calendar;
        let selectedDateStr;
        let appointments = JSON.parse(localStorage.getItem('cleaning_appts')) || [];

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: { left: 'prev,next', center: 'title', right: 'today' },
                events: appointments,
                dateClick: function(info) {
                    selectedDateStr = info.dateStr;
                    document.getElementById('selected-date-display').innerText = "Book for " + selectedDateStr;
                    document.getElementById('booking-modal').style.display = 'block';
                    document.getElementById('overlay').style.display = 'block';
                }
            });
            calendar.render();
        });

        function saveAppointment() {
            const name = document.getElementById('client-name').value;
            const time = document.getElementById('appt-time').value;
            const notes = document.getElementById('notes').value;

            if(!name) { alert("Please enter a name"); return; }

            const newEvent = {
                title: `${time} - ${name}`,
                start: selectedDateStr,
                description: notes,
                allDay: true
            };

            appointments.push(newEvent);
            localStorage.setItem('cleaning_appts', JSON.stringify(appointments));
            calendar.addEvent(newEvent);
            
            closeModal();
            // Clear inputs
            document.getElementById('client-name').value = "";
            document.getElementById('notes').value = "";
        }

        function closeModal() {
            document.getElementById('booking-modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
